# Render.com Blueprint — deploys Study Tutor as a public web service.
# https://render.com  →  New  →  Blueprint  →  connect this repo.
services:
  - type: web
    name: study-tutor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 webapp.app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # you paste the key in Render's dashboard; never stored in the repo
      - key: PYTHON_VERSION
        value: "3.12.7"
